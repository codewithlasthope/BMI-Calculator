<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="header">
                <h1>BMI CALCULATOR</h1>
                <button id="themeToggle" class="light">
                    🌙 Dark Mode
                </button>
            </div>
            
            <div class="calculator-page">
                <div class="input">
                    <label for="weight">Weight (kg):</label>
                    <input type="number" id="kg" required>
        
                    <label for="height">Height (cm):</label>
                    <input type="number" id="cm" required>
                </div>
                
                <button onclick="calculateBMI()" id="calculate">Calculate BMI</button>
                
                <div id="result">
                    
                </div>
            </div>

            
            <div class="history-page hidden">
                <h2>History</h2>
                
                <div id="history-list">
                    
                </div>
                
                <button id="clearHistory">🗑️ Clear History</button>
            </div>
        </div>
        
        <div class="chart-page hidden">
            <h2>BMI Categories</h2>

            <div class="bmi-chart">
                <div class="bmi-row underweight">
                    <span>Underweight</span>
                    <span>&lt; 18.5</span>
                </div>

                <div class="bmi-row normal">
                    <span>Normal Weight</span>
                    <span>18.5 - 24.9</span>
                </div>

                <div class="bmi-row overweight">
                    <span>Overweight</span>
                    <span>25 - 29.9</span>
                </div>

                <div class="bmi-row obese">
                    <span>Obese</span>
                    <span>30</span>
                </div>

                <div class="bmi-row obesity1">
                    <span>Obesity Class I</span>
                    <span>30 - 34.9</span>
                </div>

                <div class="bmi-row obesity2">
                    <span>Obesity Class II</span>
                    <span>35 - 39.9</span>
                </div>

                <div class="bmi-row obesity3">
                    <span>Obesity Class III</span>
                    <span>40+</span>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button id="calcTab" class="active-tab">Calculator</button>
            <button id="historyTab">History</button>
            <button id="chartTab">Chart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
